{% extends "base.html" %}

{% block auth_content %}
<div style="display:flex;height:100vh;">

  <div style="flex:1;background:#0b1324;color:white;display:flex;align-items:center;justify-content:center;">
    <h1>CS Portal</h1>
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <form method="POST" style="width:300px;">
      <h2>Login</h2>
      <br>

      <input name="username" placeholder="Username" required style="width:100%;padding:10px;margin-bottom:10px;">
      <input type="password" name="password" placeholder="Password" required style="width:100%;padding:10px;margin-bottom:10px;">

      <button class="btn" style="width:100%;">Login</button>
    </form>
  </div>

</div>
{% endblock %}
